<!DOCTYPE html>
<html>
    <head>
        <title>
            animation
        </title>
        <style>
            *{
                
            }
            body{
                height:auto;
                width: auto;
                align-items: center;
                justify-content: center;
                display: flex;
                margin-top: 30% ;
            }
            #mr{
                width: 400px;
                height: 400px;
                border: 1px solid black;
                background-color: rgb(239, 64, 16);
                align-items: center;
                justify-content: center;
                display: flex;
            }
            .rs{
                width: 100px;
                height: 100px;
                animation: rotate 1s linear infinite;
                border: 1px solid black;
                border-radius: 50%;
                background-color: olivedrab;
                display: flex;
                justify-content: center;
                align-items: center;
            }
            @keyframes rotate{
                0%{
                    transform:scale(0.7) ;
                }
                100%{
                    transform: Scale(0.2);
                }
            }
            @keyframes lod{
                0%{
                    transform:scale(0.2) ;
                }
                100%{
                    transform: Scale(2);
                }
            }
            @keyframes los{
                 0%{
                    transform:scale(0.2) ;
                }
                100%{
                    transform: Scale(2);
                }
            }
            .re{
                width: 70px;
                height: 70px;
                animation: rotate 0.2s linear infinite;
                justify-content: center;
                align-items: center;
                border:1px solid black;
                background-color: aqua;
                border-radius: 50%;
                display: flex;
                animation: los 1s ease-in infinite;
            }
            .err{
                width: 35px;
                height: 35px;
                border:1px solid black;
                border-radius: 50%;
                justify-content: center;
                align-items: center;
                background-color: orange;
                animation:lod 1s ease-in infinite;
            }
        </style>
    </head>
    <body>
        <div id="mr">
            <div class="rs one">
                <div class="re two">
                    <div class="err three"></div>
                </div>
            </div>
        </div>
    </body>
</html>
